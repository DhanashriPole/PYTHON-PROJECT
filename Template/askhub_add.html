<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add AskHub Q&A</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            width: 90%;
            max-width: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            padding: 25px;
        }
        .form-container h2 {
            text-align: center;
            color: #2575fc;
            margin-bottom: 20px;
        }
        .form-container label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
            color: #333;
        }
        .form-container input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        .form-container button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2575fc;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.3s;
        }
        .form-container button:hover {
            background: #1a4bb8;
        }
        .flash-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .flash-message.success {
            background: #d4edda;
            color: #155724;
        }
        .flash-message.danger {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>➕ Add AskHub Q&A</h2>
        <form method="POST">
            <label for="question">Question</label>
            <input type="text" id="question" name="question" placeholder="Enter question..." required>

            <label for="answer">Answer</label>
            <input type="text" id="answer" name="answer" placeholder="Enter answer..." required>

            <button type="submit">Add to AskHub</button>
        </form>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
