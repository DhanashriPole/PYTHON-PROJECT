<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Study Quiz Hub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(180deg, #eef3f8 0%, #f7f9fc 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .page-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .section-heading {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .section-heading .bi {
            font-size: 1.5rem;
        }

        .table-responsive table {
            border-radius: 18px;
            overflow: hidden;
        }

        .table thead th {
            border: 0;
        }

        .table tbody tr:hover {
            background: #f8fafc;
        }

        .btn-primary {
            box-shadow: 0 12px 26px rgba(13, 110, 253, 0.2);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home_page') }}">Study Quiz Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/">
                        <i class="bi bi-house-fill"></i> Home
                    </a>
                    <a class="nav-link" href="/Quiz_page">
                        <i class="bi bi-pencil-square"></i> Quiz
                    </a>
                    <a class="nav-link" href="/leaderboard">
                        <i class="bi bi-trophy-fill"></i> Leaderboard
                    </a>
                    <a class="nav-link" href="/students">
                        <i class="bi bi-people-fill"></i> Students
                    </a>
                    <a class="nav-link" href="/Information">
                        <i class="bi bi-info-circle-fill"></i> Info
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-4">
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
