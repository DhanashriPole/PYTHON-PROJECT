{% extends "base1.html" %}
{% block title %}Submission Received{% endblock %}
{% block content %}
<div class="page-card p-4">
    <h2>Thank you, {{ name or 'Student' }}!</h2>
    <p class="text-muted">We received your information.</p>
    <ul class="list-unstyled">
        <li><strong>Email:</strong> {{ email or '—' }}</li>
        <li><strong>Age:</strong> {{ age or '—' }}</li>
        <li><strong>Class/Grade:</strong> {{ grade or '—' }}</li>
    </ul>
    <a href="/Quiz_page" class="btn btn-primary">Start Quiz</a>
</div>
{% endblock %}
